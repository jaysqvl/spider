name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version tag to release, for example v0.1.0. Defaults to package.json.
        required: false
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  validate:
    name: Validate semver release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*

      - name: Verify workflow action pins
        run: npm run verify:workflows

      - name: Resolve and validate release version
        id: version
        shell: bash
        env:
          REQUESTED_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "$REQUESTED_VERSION" ]]; then
            tag="$REQUESTED_VERSION"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="v$(node -p "require('./package.json').version")"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must be semver with a leading v, for example v1.2.3 or v1.2.3-beta.1."
            exit 1
          fi

          version="${tag#v}"
          package_version="$(node -p "require('./package.json').version")"
          tauri_version="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          cargo_version="$(node -e "const cargo = require('fs').readFileSync('src-tauri/Cargo.toml', 'utf8'); console.log(cargo.match(/^version = \"([^\"]+)\"/m)?.[1] ?? '')")"

          if [[ "$package_version" != "$version" || "$tauri_version" != "$version" || "$cargo_version" != "$version" ]]; then
            echo "::error::Version mismatch. tag=$tag package.json=$package_version tauri.conf.json=$tauri_version Cargo.toml=$cargo_version"
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  quality-gate:
    name: Release quality gate
    needs: validate
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache Rust
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Verify workflow action pins
        run: npm run verify:workflows

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Rust format
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Rust locked dependency check
        run: cargo metadata --manifest-path src-tauri/Cargo.toml --locked --format-version 1 > /dev/null

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

  release:
    name: Build and publish ${{ matrix.name }}
    needs: [validate, quality-gate]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            rust_targets: ""
            args: ""
            asset_name_pattern: "Spider_[version]_windows-x64_[bundle][ext]"
          - name: macos-apple-silicon
            os: macos-14
            rust_targets: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
            asset_name_pattern: "Spider_[version]_macos-apple-silicon-arm64_[bundle][ext]"
          - name: macos-intel
            os: macos-13
            rust_targets: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
            asset_name_pattern: "Spider_[version]_macos-intel-x64_[bundle][ext]"

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install dependencies
        run: npm ci

      - name: Verify workflow action pins
        run: npm run verify:workflows

      - name: Rust locked dependency check
        shell: bash
        run: cargo metadata --manifest-path src-tauri/Cargo.toml --locked --format-version 1 > /dev/null

      - name: Import Windows certificate
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERTIFICATE)) {
            Write-Host "WINDOWS_CERTIFICATE not configured; building unsigned Windows artifacts."
            exit 0
          }
          New-Item -ItemType Directory -Path certificate
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Remove-Item certificate/tempCert.txt
          Import-PfxCertificate -FilePath certificate/certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)

      - name: Import Apple certificate
        if: startsWith(matrix.name, 'macos')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "APPLE_CERTIFICATE not configured; using ad-hoc signing where supported."
            exit 0
          fi
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          CERT_ID=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application|Apple Distribution/ { print $2; exit }')
          echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> "$GITHUB_ENV"
          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "APPLE_ID=$APPLE_ID" >> "$GITHUB_ENV"
            echo "APPLE_PASSWORD=$APPLE_PASSWORD" >> "$GITHUB_ENV"
            echo "APPLE_TEAM_ID=$APPLE_TEAM_ID" >> "$GITHUB_ENV"
          fi

      - name: Configure updater
        env:
          REQUIRE_TAURI_UPDATER: "true"
          TAURI_UPDATER_ENDPOINT: ${{ vars.TAURI_UPDATER_ENDPOINT }}
          TAURI_UPDATER_PUBKEY: ${{ vars.TAURI_UPDATER_PUBKEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: node scripts/configure-updater.mjs

      - name: Build and publish release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY || '-' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.validate.outputs.tag }}
          releaseName: Spider ${{ needs.validate.outputs.tag }}
          releaseBody: |
            Desktop release for Spider.

            Downloads:
            - macos-apple-silicon-arm64 DMG: Apple Silicon Macs, including M1, M2, M3, and M4.
            - macos-intel-x64 DMG: Intel Macs.
            - windows-x64 NSIS EXE: 64-bit Windows on Intel or AMD CPUs.

            Files ending in .tar.gz, .sig, and latest.json support automatic updates.
          releaseDraft: false
          prerelease: ${{ needs.validate.outputs.prerelease }}
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          assetNamePattern: ${{ matrix.asset_name_pattern }}
